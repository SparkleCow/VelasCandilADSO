<header class="header-container">
  <div class="header-container__top">
    <div class="header-container__title">
      <h1><b>Velas Candil</b></h1>
    </div>

    <div class="header-container__auth">
      @if (!auth) {
        <a class="header-container__link" (click)="login()">Login</a>
        <a class="header-container__link" (click)="register()">Registrarse</a>
      } @else {
        <p>Bienvenido, {{ username }}</p>

        <button
          class="header-container__profile-btn"
          [matMenuTriggerFor]="menuUsuario"
        >
          <mat-icon>account_circle</mat-icon>
        </button>

        <mat-menu #menuUsuario="matMenu">
          <div class="header-container__menu-header">
            <p class="header-container__username">{{ username }}</p>

            @if (true) {
              <span class="header-container__badge">Admin</span>
            }
          </div>

          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            Cerrar sesión
          </button>
        </mat-menu>
      }
    </div>
  </div>

  <nav class="header-container__navigation">
    <div class="header-container__logo">
      <img src="/logo.webp" alt="imagen logotipo de la página web" />
    </div>

    <div class="header-container__menu">
      <a class="header-container__link" (click)="home()">
        <mat-icon>home</mat-icon>
        Inicio
      </a>

      <a class="header-container__link" (click)="catalog()">
        <mat-icon>storefront</mat-icon>
        Catálogo
      </a>

      <a class="header-container__link" (click)="contact()">
        <mat-icon>mail</mat-icon>
        Contacto
      </a>

      <a class="header-container__link" (click)="cart()">
        <mat-icon>shopping_cart</mat-icon>
        Carrito
      </a>
    </div>
  </nav>
</header>
